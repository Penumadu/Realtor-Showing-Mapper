kind = "web"
previewPath = "/"
title = "Showings Route Mapper"
version = "1.0.0"
id = "artifacts/route-mapper"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20264

[services.development]
run = "pnpm --filter @workspace/route-mapper run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/route-mapper", "run", "build" ]
publicDir = "artifacts/route-mapper/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20264"
BASE_PATH = "/"
